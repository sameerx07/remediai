<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0078D4"/>
      <stop offset="55%"  stop-color="#005A9E"/>
      <stop offset="100%" stop-color="#8661C5"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.2" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative glowing orbs -->
  <circle cx="950" cy="120" r="160" fill="rgba(134,97,197,0.18)" filter="url(#glow)"/>
  <circle cx="180" cy="520" r="120" fill="rgba(0,120,212,0.2)"   filter="url(#glow)"/>

  <!-- Logo mark (top-left) -->
  <rect x="80" y="72" width="44" height="44" rx="11" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="102" cy="94" r="9"  fill="rgba(255,255,255,0.9)"/>
  <circle cx="102" cy="94" r="4.5" fill="#8661C5"/>
  <line x1="95" y1="80" x2="102" y2="87" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
  <line x1="109" y1="80" x2="102" y2="87" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
  <line x1="95" y1="108" x2="102" y2="101" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
  <line x1="109" y1="108" x2="102" y2="101" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>

  <!-- Product name -->
  <text x="138" y="106" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="34" fill="white" letter-spacing="-0.5">Remedi</text>
  <text x="307" y="106" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="34" fill="rgba(180,148,230,1)" letter-spacing="-0.5">AI</text>

  <!-- Separator line -->
  <rect x="80" y="134" width="520" height="1.5" fill="rgba(255,255,255,0.2)" rx="1"/>

  <!-- Main headline -->
  <text x="80" y="240" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="72" fill="white" letter-spacing="-2">
    AI-Powered Exception
  </text>
  <text x="80" y="330" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="72" fill="white" letter-spacing="-2">
    Remediation
  </text>

  <!-- Sub-headline -->
  <text x="80" y="398" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="400" font-size="28" fill="rgba(255,255,255,0.80)">
    For enterprise .NET applications on Azure.
  </text>
  <text x="80" y="436" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="400" font-size="28" fill="rgba(255,255,255,0.80)">
    Triage · Root Cause · Fix Recommendations · Draft PR.
  </text>

  <!-- Pill badges -->
  <rect x="80"  y="488" width="170" height="38" rx="19" fill="url(#pill)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="165" y="512" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="600" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle">LangGraph Agents</text>

  <rect x="264" y="488" width="156" height="38" rx="19" fill="url(#pill)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="342" y="512" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="600" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle">Azure OpenAI</text>

  <rect x="434" y="488" width="176" height="38" rx="19" fill="url(#pill)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="522" y="512" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="600" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle">Azure DevOps</text>

  <rect x="624" y="488" width="148" height="38" rx="19" fill="url(#pill)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="698" y="512" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="600" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle">Open Source</text>

  <!-- Live URL bottom right -->
  <text x="1120" y="590" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="20" fill="rgba(255,255,255,0.55)" text-anchor="end">
    akeesari.github.io/remediai
  </text>

  <!-- Apache badge bottom left -->
  <text x="80" y="590" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="20" fill="rgba(255,255,255,0.45)">
    Apache 2.0 · Free · Open Source
  </text>
</svg>
