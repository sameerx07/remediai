# Production overrides — populate from existing Azure infrastructure before deploying.
# Do NOT commit real values. This file is .gitignored.

global:
  registry: <acr-login-server>          # e.g. remediai.azurecr.io
  imageTag: <git-sha>
  workloadIdentityClientId: <managed-identity-client-id>

config:
  postgresFqdn: <postgres-fqdn>
  serviceBusNamespaceFqdn: <servicebus-fqdn>
  keyVaultUri: <keyvault-uri>
  aiSearchEndpoint: <aisearch-endpoint>
  logLevel: "INFO"

dashboard:
  ingress:
    host: <actual-dns-name>
    tlsSecretName: remediai-tls
