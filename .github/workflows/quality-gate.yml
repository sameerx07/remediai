name: Quality Gate and Container Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction --no-root

      - name: Ruff lint and format check
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

  typecheck:
    name: Typecheck
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction --no-root

      - name: mypy strict
        run: poetry run mypy apps/ packages/ --strict

  security:
    name: Security and dependency scan
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Python dependency scan
        run: |
          python -m pip install --upgrade pip
          pip install poetry pip-audit detect-secrets
          poetry install --no-interaction --no-root
          VENV_PATH=$(poetry env info -p)
          PIPAPI_PYTHON_LOCATION="$VENV_PATH/bin/python" pip-audit \
            --ignore-vuln PYSEC-2026-76 \
            --ignore-vuln PYSEC-2026-77 \
            --ignore-vuln PYSEC-2026-83 \
            --ignore-vuln CVE-2025-64439 \
            --ignore-vuln CVE-2026-27794 \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln CVE-2025-54121 \
            --ignore-vuln CVE-2025-62727

      - name: Frontend dependency scan
        run: |
          cd apps/dashboard
          npm install --legacy-peer-deps
          npm audit --audit-level=moderate

      - name: Secret scan
        run: python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline $(git ls-files)

  test:
    name: Tests
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction --no-root

      - name: Validate prompt contracts
        run: poetry run python scripts/validate_prompt_contracts.py

      - name: Run pytest
        run: |
          mkdir -p results
          poetry run pytest tests/ -x -v --ignore=tests/e2e --junitxml=results/test-results.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: results/test-results.xml

  frontend:
    name: Frontend production build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Build dashboard
        run: |
          cd apps/dashboard
          npm install --legacy-peer-deps
          npm run build

  docs-container:
    name: Docs container build
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docs image
        run: docker build -f apps/docs/Dockerfile -t remediai-docs:${{ github.sha }} .

  local-smoke:
    name: Local Docker Compose smoke
    needs: docs-container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local env
        run: cp .env.example .env

      - name: Validate compose configuration
        run: docker compose --env-file .env config

      - name: Bring up stack and run smoke checks
        run: |
          docker compose --env-file .env up -d --build
          make local-smoke

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  docker-build:
    name: Docker image build
    needs: local-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t remediai-api:${{ github.sha }} .

      - name: Build worker image
        run: docker build -f apps/worker/Dockerfile -t remediai-worker:${{ github.sha }} .

      - name: Build dashboard image
        run: docker build -f apps/dashboard/Dockerfile -t remediai-dashboard:${{ github.sha }} .
