name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────
# Shared Python setup reused by every job
# ─────────────────────────────────────────────
defaults:
  run:
    shell: bash

jobs:
  # ── 1. Lint ────────────────────────────────
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          pip install --quiet --upgrade pip poetry
          poetry install --no-interaction --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  # ── 2. Type check ─────────────────────────
  typecheck:
    name: Typecheck
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          pip install --quiet --upgrade pip poetry
          poetry install --no-interaction --no-root

      - name: mypy strict
        run: poetry run mypy apps/ packages/ --strict

  # ── 3. Security scan ──────────────────────
  security:
    name: Security scan
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}

      - name: Install Python dependencies
        run: |
          pip install --quiet --upgrade pip poetry pip-audit detect-secrets
          poetry install --no-interaction --no-root

      - name: Python dependency audit
        run: |
          VENV_PATH=$(poetry env info -p)
          PIPAPI_PYTHON_LOCATION="$VENV_PATH/bin/python" pip-audit \
            --ignore-vuln PYSEC-2026-76 \
            --ignore-vuln PYSEC-2026-77 \
            --ignore-vuln PYSEC-2026-83 \
            --ignore-vuln CVE-2025-64439 \
            --ignore-vuln CVE-2026-27794 \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln CVE-2025-54121 \
            --ignore-vuln CVE-2025-62727

      - name: Frontend dependency audit
        run: |
          cd apps/dashboard
          npm install --legacy-peer-deps --silent
          npm audit --audit-level=high || true

      - name: Secret scan
        run: python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline $(git ls-files)

  # ── 4. Tests ──────────────────────────────
  test:
    name: Tests
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          pip install --quiet --upgrade pip poetry
          poetry install --no-interaction --no-root

      - name: Validate prompt contracts
        run: poetry run python scripts/validate_prompt_contracts.py

      - name: Run unit tests
        run: |
          mkdir -p results
          poetry run pytest tests/unit/ -x -v --junitxml=results/test-results.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: results/test-results.xml

  # ── 5. Frontend build ─────────────────────
  frontend:
    name: Frontend build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Build dashboard
        run: |
          cd apps/dashboard
          npm install --legacy-peer-deps --silent
          npm run build

  # ── 6. Docker image builds ────────────────
  #    Push to main only — skip on PRs
  docker-build:
    name: Docker image build
    needs: frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t remediai-api:${{ github.sha }} .

      - name: Build worker image
        run: docker build -f apps/worker/Dockerfile -t remediai-worker:${{ github.sha }} .

      - name: Build dashboard image
        run: docker build -f apps/dashboard/Dockerfile -t remediai-dashboard:${{ github.sha }} .

  # ── 7. Local compose smoke test ───────────
  #    Push to main only — requires all images built
  local-smoke:
    name: Local compose smoke
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose --env-file .env config

      - name: Start stack
        run: docker compose --env-file .env up -d --build

      - name: Run smoke checks
        run: make local-smoke

      - name: Tear down
        if: always()
        run: docker compose down -v
