name: ACR Release + AKS Deploy

on:
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: aitenant.azurecr.io
  ACR_IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build and push images to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/remediai-api:${{ env.ACR_IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/remediai-api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/remediai-worker:${{ env.ACR_IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/remediai-worker:latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/remediai-dashboard:${{ env.ACR_IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/remediai-dashboard:latest

  deploy:
    name: Deploy to AKS namespace ai
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }} --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy Helm chart to namespace ai
        run: |
          helm upgrade --install remediai infrastructure/helm/remediai \
            --namespace ai --create-namespace \
            --set global.imageRegistry=${{ env.ACR_LOGIN_SERVER }} \
            --set global.imageTag=${{ env.ACR_IMAGE_TAG }}